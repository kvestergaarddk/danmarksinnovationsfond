<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danmarks Innovationsfond</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&family=Parkinsans:wght@600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f4f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      padding: 48px;
      max-width: 480px;
      width: 90%;
    }
    h1 {
      font-family: 'Parkinsans', sans-serif;
      font-weight: 600;
      font-size: 24px;
      line-height: 28px;
      color: #08006F;
      margin-bottom: 8px;
    }
    p {
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 14px;
      color: #08006F;
      opacity: 0.5;
      margin-bottom: 40px;
    }
    .links {
      display: flex;
      flex-direction: column;
    }
    .row {
      display: flex;
      align-items: center;
      border-bottom: 1px solid #08006F;
    }
    .row:first-child { border-top: 1px solid #08006F; }
    a.link {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      text-decoration: none;
      color: #08006F;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 18px;
      line-height: 26px;
      transition: gap 0.2s ease;
      gap: 10px;
    }
    a.link:hover { gap: 16px; }
    .arrow { flex-shrink: 0; opacity: 0.5; }
    a.download {
      display: flex;
      align-items: center;
      padding: 20px 0 20px 20px;
      color: #08006F;
      opacity: 0.4;
      text-decoration: none;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    a.download:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Danmarks Innovationsfond</h1>
    <p>Visuelle koncepter til review</p>
    <div class="links">
      <div class="row">
        <a class="link" href="background-dark.html">
          Mørk baggrund
          <svg class="arrow" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6H10M7 3L10 6L7 9" stroke="#08006F" stroke-width="1.2" stroke-linecap="square" stroke-linejoin="miter"/></svg>
        </a>
      </div>
      <div class="row">
        <a class="link" href="DI-background.html">
          DI baggrund
          <svg class="arrow" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6H10M7 3L10 6L7 9" stroke="#08006F" stroke-width="1.2" stroke-linecap="square" stroke-linejoin="miter"/></svg>
        </a>
      </div>
      <div class="row">
        <a class="link" href="DI-animation.html">
          DI animation
          <svg class="arrow" width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6H10M7 3L10 6L7 9" stroke="#08006F" stroke-width="1.2" stroke-linecap="square" stroke-linejoin="miter"/></svg>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
