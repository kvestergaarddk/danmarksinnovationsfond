<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DI Prototyper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 48px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #666;
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      text-decoration: none;
      color: #111;
      font-size: 15px;
      font-weight: 500;
      transition: border-color 0.15s, background 0.15s;
    }
    a:hover {
      border-color: #111;
      background: #fafafa;
    }
    .arrow {
      color: #999;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Danmarks Innovationsfond</h1>
    <p>Visuelle koncepter til review</p>
    <div class="links">
      <a href="background-dark.html">
        Mørk baggrund
        <span class="arrow">→</span>
      </a>
      <a href="DI-background.html">
        DI baggrund
        <span class="arrow">→</span>
      </a>
      <a href="DI-animation.html">
        DI animation
        <span class="arrow">→</span>
      </a>
    </div>
  </div>
</body>
</html>
